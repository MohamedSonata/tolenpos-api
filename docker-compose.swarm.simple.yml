services:
  strapi:
    build: .
    image: mosonata/tolen-pos-api
    restart: unless-stopped
    env_file: ./.env.production
    deploy:
      replicas: 3
      update_config:
        parallelism: 3
        delay: 50s
      restart_policy:
        condition: on-failure
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./yarn.lock:/opt/yarn.lock
      - ./public/uploads:/opt/app/public/uploads
    ports:
      - "1334:1334"
    depends_on:
      - tolenPosDb
      - tolenPosRedis

  tolenPosDb:
    restart: unless-stopped
    env_file: ./.env.production
    image: postgres:latest
    environment:
      POSTGRES_USER: tolenpos
      POSTGRES_PASSWORD: AddingIt
      POSTGRES_DB: tolen_pos_db
    volumes:
      - strapi-tolen-data:/var/lib/postgresql
    ports:
      - "5439:5432"

  tolenPosRedis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - tolen-pos-redis-data:/data
    # Simple command without config file
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  strapi-tolen-data:
  tolen-pos-redis-data:
